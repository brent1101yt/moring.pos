<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華興店 - 店員接單後台</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <!-- 頂部標題與統計 -->
        <header class="admin-header">
            <div class="logo">華興店 接單後台</div>
            <button onclick="simulateNewOrder()" class="primary-btn" style="padding: 10px 20px; border-radius: 10px; max-width: 150px;">模擬新訂單</button>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">未處理</span>
                    <span id="pending-count" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">已完成</span>
                    <span id="completed-count" class="stat-value">0</span>
                </div>
            </div>
        </header>

        <!-- 訂單列表區域 -->
        <main class="orders-section">
            <h2>即時訂單</h2>
            <div id="orders-grid" class="orders-grid">
                <!-- 動態生成訂單卡片 -->
                <div class="no-orders">目前沒有新訂單</div>
            </div>
        </main>
    </div>

    <!-- 模擬推播通知的聲音（可選） -->
    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
